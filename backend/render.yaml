services:
  - type: web
    name: chess-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.0
    autoDeploy: true

databases:
  - name: chess-db
    databaseName: chess
    user: chess_user
